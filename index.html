<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Snapshot</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fdfbf7;
        }
        
        /* Vintage Ledger Theme */
        .navbar {
            background-color: #556B2F !important;
            color: white !important;
        }
        
        .navbar-brand, .navbar-nav .nav-link {
            color: white !important;
        }
        
        .btn-outline-secondary, .btn-outline-primary {
            background-color: #556B2F !important;
            border-color: #556B2F !important;
            color: white !important;
        }
        
        .btn-outline-secondary:hover, .btn-outline-primary:hover {
            background-color: #4a5a27 !important;
            border-color: #4a5a27 !important;
        }
        
        /* Summary Cards with Gold Border */
        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            background-color: white;
            border-top: 4px solid #D4AF37;
            border-left: none;
            border-right: none;
            border-bottom: none;
        }
        
        .card-body h3 {
            color: #556B2F;
            font-weight: bold;
        }
        
        /* Ledger Feed Styles */
        .table-responsive {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .audit-log-entry {
            font-size: 0.875rem;
            color: #6c757d;
        }
        .btn-group-sm .btn {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
        }
        
        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #556B2F;
            color: white;
            border: 2px solid #D4AF37;
            font-size: 28px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .fab:hover {
            transform: scale(1.1);
            background-color: #4a5a27;
        }
        
        /* Card Feed Styles */
        .ledger-card {
            border-left: 5px solid #556B2F;
            transition: all 0.3s ease;
        }
        
        /* Alternate cards styling - make them slightly darker */
        .ledger-card:nth-child(odd) {
            background-color: #f8f9fa;
        }
        
        .ledger-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15) !important;
        }
        
        .card-header {
            background-color: transparent;
            border-bottom: none;
            padding: 1rem 0 0.5rem 0;
        }
        
        .card-body {
            padding: 1rem;
        }
        
        .total-amount {
            font-size: 1.25rem;
            font-weight: bold;
            color: #556B2F;
        }
        
        .category-badge {
            font-size: 0.8rem;
            padding: 0.25rem 0.5rem;
            border-radius: 1rem;
            background-color: #e9ecef;
            color: #495057;
        }
        
        .dead-stock-card {
            border-left-color: #dc3545 !important;
        }
        
        .dead-stock-total {
            color: #dc3545 !important;
        }
        
        
        /* Mobile-friendly table styles */
        @media (max-width: 768px) {
            .table-responsive {
                font-size: 0.875rem;
            }
            
            .btn-group-sm .btn {
                font-size: 0.7rem;
                padding: 0.2rem 0.4rem;
                min-width: 60px;
            }
            
            /* Stack table on very small screens */
            @media (max-width: 576px) {
                .table thead {
                    display: none;
                }
                
                .table tbody tr {
                    display: block;
                    border: 1px solid #dee2e6;
                    margin-bottom: 10px;
                    padding: 10px;
                    background-color: #fff;
                }
                
                .table tbody td {
                    display: block;
                    text-align: right;
                    border: none;
                    padding: 5px 0;
                    position: relative;
                }
                
                .table tbody td::before {
                    content: attr(data-label);
                    position: absolute;
                    left: 0;
                    width: 40%;
                    padding-left: 10px;
                    font-weight: bold;
                    text-align: left;
                    color: #495057;
                }
                
                /* Actions column styling for mobile */
                .table tbody td:last-child {
                    text-align: center;
                    display: flex;
                    gap: 5px;
                    justify-content: center;
                    padding-top: 10px;
                    border-top: 1px solid #dee2e6;
                }
                
                .table tbody td:last-child::before {
                    display: none;
                }
            }
        }
        
        /* Category button styling */
        .btn-check:checked + .btn-outline-secondary {
            background-color: #556B2F !important;
            border-color: #556B2F !important;
            color: white !important;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Wealth Snapshot</a>
            <div class="navbar-nav ms-auto">
                <button class="btn btn-outline-secondary me-2" data-bs-toggle="modal" data-bs-target="#settingsModal">
                    Settings
                </button>
                <button class="btn btn-outline-primary" id="syncBtn">
                    Sync to GitHub
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <!-- Summary Cards -->
        <div class="row mb-4">
            <div class="col-6 col-md-2">
                <div class="card">
                    <div class="card-body text-center">
                        <h6 class="card-title text-muted">Liquidity</h6>
                        <h3 class="card-text" id="liquidityCard">$0.00</h3>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-2">
                <div class="card">
                    <div class="card-body text-center">
                        <h6 class="card-title text-muted">Inventory</h6>
                        <h3 class="card-text" id="inventoryCard">$0.00</h3>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-2">
                <div class="card">
                    <div class="card-body text-center">
                        <h6 class="card-title text-muted">Investment</h6>
                        <h3 class="card-text" id="investmentCard">$0.00</h3>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-2">
                <div class="card">
                    <div class="card-body text-center">
                        <h6 class="card-title text-muted">Receivable</h6>
                        <h3 class="card-text" id="receivableCard">$0.00</h3>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-2">
                <div class="card">
                    <div class="card-body text-center">
                        <h6 class="card-title text-muted">Giveable</h6>
                        <h3 class="card-text" id="giveableCard">$0.00</h3>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-2">
                <div class="card">
                    <div class="card-body text-center">
                        <h6 class="card-title text-muted">Net Worth</h6>
                        <h3 class="card-text" id="netWorthCard">$0.00</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <ul class="nav nav-tabs" id="mainTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="ledger-tab" data-bs-toggle="tab" data-bs-target="#ledger" type="button" role="tab">
                    Ledger
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="audit-tab" data-bs-toggle="tab" data-bs-target="#audit" type="button" role="tab">
                    Audit Log
                </button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content" id="mainTabContent">
            <!-- Ledger Tab -->
            <div class="tab-pane fade show active" id="ledger" role="tabpanel">
                <div class="card mt-3">
                    <div class="card-body">
                        <div id="ledgerFeed" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"></div>
                    </div>
                </div>
            </div>

            <!-- Audit Log Tab -->
            <div class="tab-pane fade" id="audit" role="tabpanel">
                <div class="card mt-3">
                    <div class="card-header">
                        <h5 class="mb-0">Audit Log</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-sm">
                                <thead>
                                    <tr>
                                        <th>Timestamp</th>
                                        <th>Action</th>
                                        <th>Item</th>
                                        <th>Details</th>
                                    </tr>
                                </thead>
                                <tbody id="auditTableBody">
                                    <!-- Audit log entries will be inserted here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Action Button -->
    <button class="fab" data-bs-toggle="modal" data-bs-target="#addEntryModal" title="Add New Entry">
        +
    </button>

    <!-- Settings Modal -->
    <div class="modal fade" id="settingsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">GitHub Settings</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="settingsForm">
                        <div class="mb-3">
                            <label for="githubToken" class="form-label">GitHub PAT</label>
                            <input type="password" class="form-control" id="githubToken" placeholder="Enter GitHub Personal Access Token">
                        </div>
                        <div class="mb-3">
                            <label for="githubUsername" class="form-label">Username</label>
                            <input type="text" class="form-control" id="githubUsername" placeholder="Enter GitHub username">
                        </div>
                        <div class="mb-3">
                            <label for="githubRepo" class="form-label">Repository Name</label>
                            <input type="text" class="form-control" id="githubRepo" placeholder="Enter repository name">
                        </div>
                        <div class="mb-3">
                            <label for="githubFile" class="form-label">File Path</label>
                            <input type="text" class="form-control" id="githubFile" value="data.json">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="saveSettingsBtn">Save Settings</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="syncToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto">GitHub Sync</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage">
                <!-- Message will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Add/Edit Entry Modal -->
    <div class="modal fade" id="addEntryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="entryModalTitle">Entry Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="entryForm">
                        <input type="hidden" id="entryId">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <input type="date" class="form-control" id="entryDate" required>
                            </div>
                            <div class="col-md-6">
                                <input type="text" class="form-control" id="entryDescription" placeholder="Description" style="cursor: default;" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <div class="btn-group d-flex flex-wrap" role="group" aria-label="Category selection">
                                <input type="radio" class="btn-check" name="entryCategory" id="cat-liquidity" value="Liquidity" autocomplete="off">
                                <label class="btn btn-success me-2 mb-2" for="cat-liquidity">Liquidity</label>
                                
                                <input type="radio" class="btn-check" name="entryCategory" id="cat-inventory" value="Inventory" autocomplete="off">
                                <label class="btn btn-success me-2 mb-2" for="cat-inventory">Inventory</label>
                                
                                <input type="radio" class="btn-check" name="entryCategory" id="cat-investment" value="Investment" autocomplete="off">
                                <label class="btn btn-success me-2 mb-2" for="cat-investment">Investment</label>
                                
                                <input type="radio" class="btn-check" name="entryCategory" id="cat-receivable" value="Receivable" autocomplete="off">
                                <label class="btn btn-success me-2 mb-2" for="cat-receivable">Receivable</label>
                                
                                <input type="radio" class="btn-check" name="entryCategory" id="cat-giveable" value="Giveable" autocomplete="off">
                                <label class="btn btn-success me-2 mb-2" for="cat-giveable">Giveable</label>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <input type="number" class="form-control" id="entryAmount" step="0.01" min="0" placeholder="Amount per Unit" required>
                            </div>
                            <div class="col-md-6">
                                <input type="number" class="form-control" id="entryQty" value="1" min="1" placeholder="Quantity" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <div class="btn-group d-flex" role="group" aria-label="Status selection">
                                <input type="radio" class="btn-check" name="entryStatus" id="status-active" value="active" autocomplete="off" checked>
                                <label class="btn btn-outline-success me-2" for="status-active">Active</label>
                                
                                <input type="radio" class="btn-check" name="entryStatus" id="status-pending" value="pending" autocomplete="off">
                                <label class="btn btn-outline-warning" for="status-pending">Pending</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Total: AED <span id="entryTotal">0.00</span></label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveEntryBtn">Save Entry</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // State Management
        let state = {
            ledger: [],
            audit_log: []
        };

        // Inline Editing State Tracking
        let inlineEditingIndex = -1;

        // GitHub API Integration
        const githubAPI = {
            getCredentials() {
                return {
                    token: localStorage.getItem('github_token'),
                    username: localStorage.getItem('github_username'),
                    repo: localStorage.getItem('github_repo'),
                    file: localStorage.getItem('github_file') || 'data.json'
                };
            },

            async fetchFromGitHub() {
                const creds = this.getCredentials();
                if (!creds.token || !creds.username || !creds.repo) {
                    throw new Error('GitHub credentials not configured');
                }

                const url = `https://api.github.com/repos/${creds.username}/${creds.repo}/contents/${creds.file}`;
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `token ${creds.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`GitHub API error: ${response.status}`);
                }

                const data = await response.json();
                const content = JSON.parse(atob(data.content));
                return { content, sha: data.sha };
            },

            async syncToGitHub() {
                const creds = this.getCredentials();
                if (!creds.token || !creds.username || !creds.repo) {
                    throw new Error('GitHub credentials not configured');
                }

                // Get current file SHA
                let sha = null;
                try {
                    const currentData = await this.fetchFromGitHub();
                    sha = currentData.sha;
                } catch (error) {
                    // File doesn't exist, that's okay
                }

                const url = `https://api.github.com/repos/${creds.username}/${creds.repo}/contents/${creds.file}`;
                const content = btoa(JSON.stringify(state, null, 2));
                
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${creds.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'Update data.json via Wealth Snapshot',
                        content: content,
                        sha: sha
                    })
                });

                if (!response.ok) {
                    throw new Error(`GitHub API error: ${response.status}`);
                }

                return await response.json();
            }
        };

        // State Management Functions
        function saveState() {
            localStorage.setItem('wealth_snapshot_state', JSON.stringify(state));
            updateSummaryCards();
            inlineEditingIndex = -1;
            renderLedger();
            renderAuditLog();
            syncToGitHubIfNeeded();
        }
        
        async function syncToGitHubIfNeeded() {
            const creds = githubAPI.getCredentials();
            if (creds.token && creds.username && creds.repo) {
                try {
                    await githubAPI.syncToGitHub();
                    showToast('Auto-synced to GitHub!', 'success');
                } catch (error) {
                    console.warn('Auto-sync failed:', error.message);
                    // Don't show toast for auto-sync failures to avoid spam
                }
            }
        }

        function migrateData() {
            // Add status field to existing entries that don't have it
            state.ledger.forEach(entry => {
                if (!entry.status) {
                    entry.status = 'active';
                }
            });
        }

        function loadState() {
            const saved = localStorage.getItem('wealth_snapshot_state');
            if (saved) {
                state = JSON.parse(saved);
                migrateData();
            } else {
                // Initialize with sample data
                state.ledger = [
                    { id: generateId(), date: '2024-01-15', description: 'Cash on hand', category: 'Liquidity', status: 'active', qty: 1, amount: 5000, total: 5000 },
                    { id: generateId(), date: '2024-01-20', description: 'Laptop inventory', category: 'Inventory', status: 'active', qty: 2, amount: 1200, total: 2400 },
                    { id: generateId(), date: '2024-01-25', description: 'Stock investments', category: 'Investment', status: 'active', qty: 1, amount: 3000, total: 3000 },
                    { id: generateId(), date: '2024-01-28', description: 'Client receivables', category: 'Receivable', status: 'pending', qty: 1, amount: 2500, total: 2500 },
                    { id: generateId(), date: '2024-01-30', description: 'Charitable donations', category: 'Giveable', status: 'active', qty: 1, amount: 1000, total: 1000 }
                ];
                state.audit_log = [
                    { timestamp: new Date().toISOString(), action: 'INITIALIZE', item: 'STATE', details: 'Initial state created' }
                ];
            }
            saveState();
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function logAction(actionType, itemName, details) {
            state.audit_log.unshift({
                timestamp: new Date().toISOString(),
                action: actionType,
                item: itemName,
                details: details
            });
        }

        // UI Update Functions
        function updateSummaryCards() {
            const liquidity = calculateCategoryTotal('Liquidity');
            const inventory = calculateCategoryTotal('Inventory');
            const investment = calculateCategoryTotal('Investment');
            const receivable = calculateCategoryTotal('Receivable');
            const giveable = calculateCategoryTotal('Giveable');
            const netWorth = liquidity + inventory + investment + receivable + giveable;

            document.getElementById('liquidityCard').textContent = formatCurrency(liquidity);
            document.getElementById('inventoryCard').textContent = formatCurrency(inventory);
            document.getElementById('investmentCard').textContent = formatCurrency(investment);
            document.getElementById('receivableCard').textContent = formatCurrency(receivable);
            document.getElementById('giveableCard').textContent = formatCurrency(giveable);
            document.getElementById('netWorthCard').textContent = formatCurrency(netWorth);
        }

        function calculateCategoryTotal(category) {
            return state.ledger
                .filter(item => item.category === category)
                .reduce((total, item) => total + item.total, 0);
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-AE', {
                style: 'currency',
                currency: 'AED',
                minimumFractionDigits: 2
            }).format(amount);
        }

        function renderLedger() {
            const feed = document.getElementById('ledgerFeed');
            feed.innerHTML = '';

            if (state.ledger.length === 0) {
                feed.innerHTML = '<div class="text-center text-muted p-5">No entries yet. Add your first entry!</div>';
                return;
            }

            state.ledger.forEach((item, index) => {
                const card = document.createElement('div');
                const isDeadStock = item.category === 'Dead Stock';
                const cardClass = isDeadStock ? 'card shadow-sm border-0 dead-stock-card' : 'card shadow-sm border-0 ledger-card';
                
                card.className = cardClass;
                
                // Conditional rendering based on inline editing state
                if (index === inlineEditingIndex) {
                    // Edit Mode - Render form inputs with specific IDs (matching view mode layout)
                    card.innerHTML = `
                        <div class="card-body">
                            <!-- Line 1: Date on left, Status and Action buttons on right -->
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <input id="edit-date-${index}" type="date" class="form-control form-control-sm" value="${item.date}" style="width: auto;">
                                <div class="d-flex align-items-center gap-2">
                                    <select id="edit-status-${index}" class="form-select form-select-sm" style="width: auto;">
                                        <option value="active" ${item.status === 'active' ? 'selected' : ''}>Active</option>
                                        <option value="pending" ${item.status === 'pending' ? 'selected' : ''}>Pending</option>
                                    </select>
                                    <div class="btn-group btn-group-sm" role="group">
                                        <button class="btn btn-sm btn-success p-1" onclick="saveInlineEdit(${index})" title="Save">
                                            <i class="fas fa-save"></i>
                                        </button>
                                        <button class="btn btn-sm btn-secondary p-1" onclick="cancelInlineEdit()" title="Cancel">
                                            <i class="fas fa-times"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <!-- Line 2: Description on left, Total amount on right -->
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <input id="edit-description-${index}" type="text" class="form-control form-control-sm" value="${item.description}">
                                <div class="total-amount ${isDeadStock ? 'dead-stock-total' : ''}">${formatCurrency(item.total)}</div>
                            </div>
                            <!-- Line 3: Category on left, Quantity and Amount on right -->
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <select id="edit-category-${index}" class="form-select form-select-sm" style="width: auto;">
                                    <option value="Liquidity" ${item.category === 'Liquidity' ? 'selected' : ''}>Liquidity</option>
                                    <option value="Inventory" ${item.category === 'Inventory' ? 'selected' : ''}>Inventory</option>
                                    <option value="Investment" ${item.category === 'Investment' ? 'selected' : ''}>Investment</option>
                                    <option value="Receivable" ${item.category === 'Receivable' ? 'selected' : ''}>Receivable</option>
                                    <option value="Giveable" ${item.category === 'Giveable' ? 'selected' : ''}>Giveable</option>
                                </select>
                                <div class="d-flex gap-2">
                                    <input id="edit-qty-${index}" type="number" class="form-control form-control-sm" value="${item.qty}" min="1" style="width: 60px;">
                                    <input id="edit-amount-${index}" type="number" class="form-control form-control-sm" value="${item.amount}" step="0.01" min="0" style="width: 120px;">
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    // View Mode - Render static text with specified button format
                    card.innerHTML = `
                        <div class="card-body">
                            <!-- Line 1: Date on left, Status and Action buttons on right -->
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <small class="text-muted">${item.date}</small>
                                <div class="d-flex align-items-center gap-2">
                                    <span class="badge ${item.status === 'active' ? 'bg-success' : 'bg-warning'}">${item.status}</span>
                                    <div class="btn-group btn-group-sm" role="group">
                                        <button class="btn btn-sm text-secondary p-1" onclick="startInlineEdit(${index})" title="Edit">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn btn-sm text-danger border-0 p-1" onclick="deleteEntryById('${item.id}')" title="Delete">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <!-- Line 2: Description on left, Total amount on right -->
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h5 class="card-title mb-0">${item.description}</h5>
                                <div class="total-amount ${isDeadStock ? 'dead-stock-total' : ''}">${formatCurrency(item.total)}</div>
                            </div>
                            <!-- Line 3: Category on left, Quantity and Amount on right -->
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="category-badge">${item.category}</span>
                                <small class="text-muted">Qty: ${item.qty} @ ${formatCurrency(item.amount)}</small>
                            </div>
                        </div>
                    `;
                }
                feed.appendChild(card);
            });
        }

        // Inline Editing Functions
        function startInlineEdit(index) {
            inlineEditingIndex = index;
            renderLedger();
        }

        function cancelInlineEdit() {
            inlineEditingIndex = -1;
            renderLedger();
        }

        function saveInlineEdit(index) {
            // Get values from specific input IDs
            const date = document.getElementById(`edit-date-${index}`).value;
            const description = document.getElementById(`edit-description-${index}`).value;
            const category = document.getElementById(`edit-category-${index}`).value;
            const status = document.getElementById(`edit-status-${index}`).value;
            const qty = parseInt(document.getElementById(`edit-qty-${index}`).value);
            const amount = parseFloat(document.getElementById(`edit-amount-${index}`).value);
            const total = qty * amount;

            // Update the entry
            state.ledger[index] = { 
                ...state.ledger[index], 
                date, 
                description, 
                category, 
                status,
                qty, 
                amount, 
                total 
            };

            // Log the action
            logAction('Edited', description, `Amount: ${formatCurrency(amount)}, Category: ${category}, Status: ${status}`);

            // Save state to localStorage and update UI
            saveState();
        }

        function startEdit(id) {
            // Find the card containing this entry
            const card = document.querySelector(`.edit-btn[data-id="${id}"]`).closest('.card');
            
            // Show edit mode elements and hide view mode elements
            card.querySelectorAll('.view-mode').forEach(element => {
                element.style.display = 'none';
            });
            
            card.querySelectorAll('.edit-mode').forEach(element => {
                element.style.display = 'block';
            });
            
            // Show save button and hide edit button
            const editBtn = card.querySelector('.edit-btn');
            const saveBtn = card.querySelector('.save-btn');
            if (editBtn && saveBtn) {
                editBtn.style.display = 'none';
                saveBtn.style.display = 'inline-block';
            }
        }

        function saveEntry(id) {
            // Find the card containing this entry
            const card = document.querySelector(`.save-btn[data-id="${id}"]`).closest('.card');
            
            // Get updated values from edit mode elements
            const date = card.querySelector('.edit-mode[type="date"]').value;
            const description = card.querySelector('.edit-mode[type="text"]').value;
            const category = card.querySelector('.edit-mode.form-select').value;
            const qty = parseInt(card.querySelector('.qty-input').value);
            const amount = parseFloat(card.querySelector('.amount-input').value);
            const total = qty * amount;

            const updatedEntry = { id, date, description, category, qty, amount, total };
            
            // Update the entry
            updateEntry(id, updatedEntry);
            
            // Refresh the view
            renderLedger();
        }

        function renderAuditLog() {
            const tbody = document.getElementById('auditTableBody');
            tbody.innerHTML = '';

            // Show last 50 entries, most recent first
            const recentLogs = state.audit_log.slice(0,50);

            if (recentLogs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No audit entries yet.</td></tr>';
                return;
            }

            recentLogs.forEach(log => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${new Date(log.timestamp).toLocaleString()}</td>
                    <td><span class="badge bg-secondary">${log.action}</span></td>
                    <td>${log.item}</td>
                    <td class="audit-log-entry">${log.details}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // CRUD Operations
        function addEntry(entry) {
            state.ledger.push(entry);
            logAction('Added', entry.description, `Amount: ${formatCurrency(entry.amount)}, Category: ${entry.category}`);
            saveState();
        }

        function updateEntry(id, updatedEntry) {
            const index = state.ledger.findIndex(item => item.id === id);
            if (index !== -1) {
                const oldEntry = { ...state.ledger[index] };
                state.ledger[index] = updatedEntry;
                logAction('Updated', updatedEntry.description, `Amount: ${formatCurrency(updatedEntry.amount)}, Category: ${updatedEntry.category}`);
                saveState();
            }
        }

        function deleteEntry(id) {
            const index = state.ledger.findIndex(item => item.id === id);
            if (index !== -1) {
                const deletedEntry = state.ledger[index];
                if (window.confirm(`Are you sure you want to delete "${deletedEntry.description}"?`)) {
                    state.ledger.splice(index, 1);
                    logAction('Deleted', deletedEntry.description, `Amount: ${formatCurrency(deletedEntry.amount)}, Category: ${deletedEntry.category}`);
                    saveState();
                }
            }
        }

        function deleteEntryById(id) {
            const index = state.ledger.findIndex(item => item.id === id);
            if (index !== -1) {
                const deletedEntry = state.ledger[index];
                if (window.confirm(`Are you sure you want to delete "${deletedEntry.description}"?`)) {
                    state.ledger.splice(index, 1);
                    logAction('Deleted', deletedEntry.description, `Amount: ${formatCurrency(deletedEntry.amount)}, Category: ${deletedEntry.category}`);
                    saveState();
                }
            }
        }


        // Modal Functions (for adding new entries only)
        function openAddModal() {
            document.getElementById('entryModalTitle').textContent = 'Add Entry';
            document.getElementById('entryForm').reset();
            document.getElementById('entryId').value = '';
            document.getElementById('entryTotal').textContent = '0.00';
            document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
            
            const modal = new bootstrap.Modal(document.getElementById('addEntryModal'));
            modal.show();
        }

        function resetAddModal() {
            document.getElementById('entryModalTitle').textContent = 'Add Entry';
            document.getElementById('entryForm').reset();
            document.getElementById('entryId').value = '';
            document.getElementById('entryTotal').textContent = '0.00';
            document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
        }

        // Toast Function
        function showToast(message, type) {
            const toast = document.getElementById('syncToast');
            const toastBody = document.getElementById('toastMessage');
            const toastHeader = toast.querySelector('.toast-header');
            
            // Set message
            toastBody.textContent = message;
            
            // Set type (success or danger)
            if (type === 'success') {
                toast.classList.remove('text-bg-danger');
                toast.classList.add('text-bg-success');
            } else {
                toast.classList.remove('text-bg-success');
                toast.classList.add('text-bg-danger');
            }
            
            // Show toast
            const bsToast = new bootstrap.Toast(toast);
            bsToast.show();
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize app
            loadState();

            // Load saved settings on page load
            function loadSavedSettings() {
                const token = localStorage.getItem('github_token');
                const username = localStorage.getItem('github_username');
                const repo = localStorage.getItem('github_repo');
                const file = localStorage.getItem('github_file');

                if (token) document.getElementById('githubToken').value = token;
                if (username) document.getElementById('githubUsername').value = username;
                if (repo) document.getElementById('githubRepo').value = repo;
                if (file) document.getElementById('githubFile').value = file;
            }

            // Initialize settings on page load
            loadSavedSettings();

            // Settings form
            document.getElementById('saveSettingsBtn').addEventListener('click', function() {
                const token = document.getElementById('githubToken').value;
                const username = document.getElementById('githubUsername').value;
                const repo = document.getElementById('githubRepo').value;
                const file = document.getElementById('githubFile').value;

                localStorage.setItem('github_token', token);
                localStorage.setItem('github_username', username);
                localStorage.setItem('github_repo', repo);
                localStorage.setItem('github_file', file);

                bootstrap.Modal.getInstance(document.getElementById('settingsModal')).hide();
                alert('Settings saved successfully!');
            });

            // Entry form - Modal ONLY creates new entries
            document.getElementById('saveEntryBtn').addEventListener('click', function() {
                const date = document.getElementById('entryDate').value;
                const description = document.getElementById('entryDescription').value;
                const category = document.querySelector('input[name="entryCategory"]:checked')?.value;
                const status = document.querySelector('input[name="entryStatus"]:checked')?.value || 'active';
                const qty = parseInt(document.getElementById('entryQty').value);
                const amount = parseFloat(document.getElementById('entryAmount').value);
                const total = qty * amount;

                // Validation: Check if required fields are filled
                if (!date) {
                    showToast('Please select a date.', 'danger');
                    document.getElementById('entryDate').focus();
                    return;
                }

                if (!description.trim()) {
                    showToast('Please enter a description.', 'danger');
                    document.getElementById('entryDescription').focus();
                    return;
                }

                if (!category) {
                    showToast('Please select a category.', 'danger');
                    return;
                }

                if (!amount || amount <= 0) {
                    showToast('Please enter a valid amount greater than 0.', 'danger');
                    document.getElementById('entryAmount').focus();
                    return;
                }

                if (!qty || qty <= 0) {
                    showToast('Please enter a valid quantity greater than 0.', 'danger');
                    document.getElementById('entryQty').focus();
                    return;
                }

                // Modal ONLY creates new entries - no editing logic
                const entry = { id: generateId(), date, description, category, status, qty, amount, total };
                addEntry(entry);

                bootstrap.Modal.getInstance(document.getElementById('addEntryModal')).hide();
                resetAddModal();
            });

            // Calculate total when qty or amount changes
            document.getElementById('entryQty').addEventListener('input', updateTotal);
            document.getElementById('entryAmount').addEventListener('input', updateTotal);

            function updateTotal() {
                const qty = parseInt(document.getElementById('entryQty').value) || 0;
                const amount = parseFloat(document.getElementById('entryAmount').value) || 0;
                document.getElementById('entryTotal').textContent = (qty * amount).toFixed(2);
            }

            // Sync button
            document.getElementById('syncBtn').addEventListener('click', async function() {
                const btn = this;
                const originalText = btn.textContent;
                
                try {
                    btn.textContent = 'Syncing...';
                    btn.disabled = true;
                    
                    await githubAPI.syncToGitHub();
                    showToast('Successfully synced to GitHub!', 'success');
                } catch (error) {
                    showToast('Sync failed: ' + error.message, 'danger');
                } finally {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            });

            // Load from GitHub on startup if credentials exist
            const creds = githubAPI.getCredentials();
            if (creds.token && creds.username && creds.repo) {
                githubAPI.fetchFromGitHub()
                    .then(data => {
                        state = data.content;
                        saveState();
                    })
                    .catch(error => {
                        console.warn('Could not load from GitHub:', error.message);
                    });
            }

            // Set today's date when the add entry modal opens
            document.getElementById('addEntryModal').addEventListener('shown.bs.modal', function() {
                document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
                document.getElementById('entryTotal').textContent = '0.00';
                // Automatically focus the description field when modal opens
                document.getElementById('entryDescription').focus();
            });
        });
    </script>
</body>
</html>
