<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Snapshot</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
        .table-responsive {
            max-height: 400px;
            overflow-y: auto;
        }
        .audit-log-entry {
            font-size: 0.875rem;
            color: #6c757d;
        }
        .btn-group-sm .btn {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
        }
        
        /* Mobile-friendly table styles */
        @media (max-width: 768px) {
            .table-responsive {
                font-size: 0.875rem;
            }
            
            .btn-group-sm .btn {
                font-size: 0.7rem;
                padding: 0.2rem 0.4rem;
                min-width: 60px;
            }
            
            /* Stack table on very small screens */
            @media (max-width: 576px) {
                .table thead {
                    display: none;
                }
                
                .table tbody tr {
                    display: block;
                    border: 1px solid #dee2e6;
                    margin-bottom: 10px;
                    padding: 10px;
                    background-color: #fff;
                }
                
                .table tbody td {
                    display: block;
                    text-align: right;
                    border: none;
                    padding: 5px 0;
                    position: relative;
                }
                
                .table tbody td::before {
                    content: attr(data-label);
                    position: absolute;
                    left: 0;
                    width: 40%;
                    padding-left: 10px;
                    font-weight: bold;
                    text-align: left;
                    color: #495057;
                }
                
                /* Actions column styling for mobile */
                .table tbody td:last-child {
                    text-align: center;
                    display: flex;
                    gap: 5px;
                    justify-content: center;
                    padding-top: 10px;
                    border-top: 1px solid #dee2e6;
                }
                
                .table tbody td:last-child::before {
                    display: none;
                }
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Wealth Snapshot</a>
            <div class="navbar-nav ms-auto">
                <button class="btn btn-outline-secondary me-2" data-bs-toggle="modal" data-bs-target="#settingsModal">
                    Settings
                </button>
                <button class="btn btn-outline-primary" id="syncBtn">
                    Sync to GitHub
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <!-- Summary Cards -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body text-center">
                        <h6 class="card-title text-muted">Liquidity</h6>
                        <h3 class="card-text" id="liquidityCard">$0.00</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body text-center">
                        <h6 class="card-title text-muted">Inventory</h6>
                        <h3 class="card-text" id="inventoryCard">$0.00</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body text-center">
                        <h6 class="card-title text-muted">Pending Sales</h6>
                        <h3 class="card-text" id="pendingSalesCard">$0.00</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card">
                    <div class="card-body text-center">
                        <h6 class="card-title text-muted">Net Worth</h6>
                        <h3 class="card-text" id="netWorthCard">$0.00</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <ul class="nav nav-tabs" id="mainTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="ledger-tab" data-bs-toggle="tab" data-bs-target="#ledger" type="button" role="tab">
                    Ledger
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="audit-tab" data-bs-toggle="tab" data-bs-target="#audit" type="button" role="tab">
                    Audit Log
                </button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content" id="mainTabContent">
            <!-- Ledger Tab -->
            <div class="tab-pane fade show active" id="ledger" role="tabpanel">
                <div class="card mt-3">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Ledger</h5>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addEntryModal">
                            + Add New Entry
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-bordered table-hover">
                                <thead class="table-dark">
                                    <tr>
                                        <th class="d-none d-md-table-cell">Date</th>
                                        <th>Description</th>
                                        <th class="d-none d-lg-table-cell">Category</th>
                                        <th class="d-none d-md-table-cell">Qty</th>
                                        <th class="d-none d-md-table-cell">Unit Amount</th>
                                        <th>Total</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="ledgerTableBody">
                                    <!-- Ledger entries will be inserted here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Audit Log Tab -->
            <div class="tab-pane fade" id="audit" role="tabpanel">
                <div class="card mt-3">
                    <div class="card-header">
                        <h5 class="mb-0">Audit Log</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-sm">
                                <thead>
                                    <tr>
                                        <th>Timestamp</th>
                                        <th>Action</th>
                                        <th>Item</th>
                                        <th>Details</th>
                                    </tr>
                                </thead>
                                <tbody id="auditTableBody">
                                    <!-- Audit log entries will be inserted here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal fade" id="settingsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">GitHub Settings</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="settingsForm">
                        <div class="mb-3">
                            <label for="githubToken" class="form-label">GitHub PAT</label>
                            <input type="password" class="form-control" id="githubToken" placeholder="Enter GitHub Personal Access Token">
                        </div>
                        <div class="mb-3">
                            <label for="githubUsername" class="form-label">Username</label>
                            <input type="text" class="form-control" id="githubUsername" placeholder="Enter GitHub username">
                        </div>
                        <div class="mb-3">
                            <label for="githubRepo" class="form-label">Repository Name</label>
                            <input type="text" class="form-control" id="githubRepo" placeholder="Enter repository name">
                        </div>
                        <div class="mb-3">
                            <label for="githubFile" class="form-label">File Path</label>
                            <input type="text" class="form-control" id="githubFile" value="data.json">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="saveSettingsBtn">Save Settings</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="syncToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto">GitHub Sync</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage">
                <!-- Message will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Add/Edit Entry Modal -->
    <div class="modal fade" id="addEntryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="entryModalTitle">Entry Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="entryForm">
                        <input type="hidden" id="entryId">
                        <div class="mb-3">
                            <label for="entryDate" class="form-label">Date</label>
                            <input type="date" class="form-control" id="entryDate" required>
                        </div>
                        <div class="mb-3">
                            <label for="entryDescription" class="form-label">Description</label>
                            <input type="text" class="form-control" id="entryDescription" placeholder="Enter description" required>
                        </div>
                        <div class="mb-3">
                            <label for="entryCategory" class="form-label">Category</label>
                            <select class="form-select" id="entryCategory" required>
                                <option value="Liquidity">Liquidity</option>
                                <option value="Inventory">Inventory</option>
                                <option value="Pending">Pending</option>
                                <option value="Dead Stock">Dead Stock</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="entryQty" class="form-label">Quantity</label>
                            <input type="number" class="form-control" id="entryQty" value="1" min="1" required>
                        </div>
                        <div class="mb-3">
                            <label for="entryAmount" class="form-label">Amount per Unit</label>
                            <input type="number" class="form-control" id="entryAmount" step="0.01" min="0" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Total: $<span id="entryTotal">0.00</span></label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveEntryBtn">Save Entry</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // State Management
        let state = {
            ledger: [],
            audit_log: []
        };

        // GitHub API Integration
        const githubAPI = {
            getCredentials() {
                return {
                    token: localStorage.getItem('github_token'),
                    username: localStorage.getItem('github_username'),
                    repo: localStorage.getItem('github_repo'),
                    file: localStorage.getItem('github_file') || 'data.json'
                };
            },

            async fetchFromGitHub() {
                const creds = this.getCredentials();
                if (!creds.token || !creds.username || !creds.repo) {
                    throw new Error('GitHub credentials not configured');
                }

                const url = `https://api.github.com/repos/${creds.username}/${creds.repo}/contents/${creds.file}`;
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `token ${creds.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`GitHub API error: ${response.status}`);
                }

                const data = await response.json();
                const content = JSON.parse(atob(data.content));
                return { content, sha: data.sha };
            },

            async syncToGitHub() {
                const creds = this.getCredentials();
                if (!creds.token || !creds.username || !creds.repo) {
                    throw new Error('GitHub credentials not configured');
                }

                // Get current file SHA
                let sha = null;
                try {
                    const currentData = await this.fetchFromGitHub();
                    sha = currentData.sha;
                } catch (error) {
                    // File doesn't exist, that's okay
                }

                const url = `https://api.github.com/repos/${creds.username}/${creds.repo}/contents/${creds.file}`;
                const content = btoa(JSON.stringify(state, null, 2));
                
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${creds.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'Update data.json via Wealth Snapshot',
                        content: content,
                        sha: sha
                    })
                });

                if (!response.ok) {
                    throw new Error(`GitHub API error: ${response.status}`);
                }

                return await response.json();
            }
        };

        // State Management Functions
        function saveState() {
            localStorage.setItem('wealth_snapshot_state', JSON.stringify(state));
            updateSummaryCards();
            renderLedger();
            renderAuditLog();
        }

        function loadState() {
            const saved = localStorage.getItem('wealth_snapshot_state');
            if (saved) {
                state = JSON.parse(saved);
            } else {
                // Initialize with sample data
                state.ledger = [
                    { id: generateId(), date: '2024-01-15', description: 'Cash on hand', category: 'Liquidity', qty: 1, amount: 5000, total: 5000 },
                    { id: generateId(), date: '2024-01-20', description: 'Laptop inventory', category: 'Inventory', qty: 2, amount: 1200, total: 2400 },
                    { id: generateId(), date: '2024-01-25', description: 'Pending invoice', category: 'Pending', qty: 1, amount: 1500, total: 1500 },
                    { id: generateId(), date: '2024-01-30', description: 'Obsolete equipment', category: 'Dead Stock', qty: 5, amount: 200, total: 1000 }
                ];
                state.audit_log = [
                    { timestamp: new Date().toISOString(), action: 'INITIALIZE', item: 'STATE', details: 'Initial state created' }
                ];
            }
            saveState();
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function logAction(actionType, itemName, details) {
            state.audit_log.unshift({
                timestamp: new Date().toISOString(),
                action: actionType,
                item: itemName,
                details: details
            });
        }

        // UI Update Functions
        function updateSummaryCards() {
            const liquidity = calculateCategoryTotal('Liquidity');
            const inventory = calculateCategoryTotal('Inventory');
            const pending = calculateCategoryTotal('Pending');
            const deadStock = calculateCategoryTotal('Dead Stock');
            const netWorth = liquidity + inventory + pending + deadStock;

            document.getElementById('liquidityCard').textContent = formatCurrency(liquidity);
            document.getElementById('inventoryCard').textContent = formatCurrency(inventory);
            document.getElementById('pendingSalesCard').textContent = formatCurrency(pending);
            document.getElementById('netWorthCard').textContent = formatCurrency(netWorth);
        }

        function calculateCategoryTotal(category) {
            return state.ledger
                .filter(item => item.category === category)
                .reduce((total, item) => total + item.total, 0);
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-AE', {
                style: 'currency',
                currency: 'AED',
                minimumFractionDigits: 2
            }).format(amount);
        }

        function renderLedger() {
            const tbody = document.getElementById('ledgerTableBody');
            tbody.innerHTML = '';

            if (state.ledger.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No entries yet. Add your first entry!</td></tr>';
                return;
            }

            state.ledger.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td data-label="Date">${item.date}</td>
                    <td data-label="Description">${item.description}</td>
                    <td data-label="Category"><span class="badge bg-primary">${item.category}</span></td>
                    <td data-label="Qty">${item.qty}</td>
                    <td data-label="Unit Amount">${formatCurrency(item.amount)}</td>
                    <td data-label="Total">${formatCurrency(item.total)}</td>
                    <td data-label="Actions">
                        <div class="btn-group btn-group-sm" role="group">
                            <button class="btn btn-outline-primary edit-btn" data-id="${item.id}">Edit</button>
                            <button class="btn btn-outline-danger delete-btn" data-id="${item.id}">Delete</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });

            // Add event listeners for edit and delete buttons
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => openEditModal(e.target.dataset.id));
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => deleteEntry(e.target.dataset.id));
            });
        }

        function renderAuditLog() {
            const tbody = document.getElementById('auditTableBody');
            tbody.innerHTML = '';

            // Show last 50 entries, most recent first
            const recentLogs = state.audit_log.slice(-50).reverse();

            if (recentLogs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No audit entries yet.</td></tr>';
                return;
            }

            recentLogs.forEach(log => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${new Date(log.timestamp).toLocaleString()}</td>
                    <td><span class="badge bg-secondary">${log.action}</span></td>
                    <td>${log.item}</td>
                    <td class="audit-log-entry">${log.details}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // CRUD Operations
        function addEntry(entry) {
            state.ledger.push(entry);
            logAction('Added', entry.description, `Amount: ${formatCurrency(entry.amount)}, Category: ${entry.category}`);
            saveState();
        }

        function updateEntry(id, updatedEntry) {
            const index = state.ledger.findIndex(item => item.id === id);
            if (index !== -1) {
                const oldEntry = { ...state.ledger[index] };
                state.ledger[index] = updatedEntry;
                logAction('Updated', updatedEntry.description, `Amount: ${formatCurrency(updatedEntry.amount)}, Category: ${updatedEntry.category}`);
                saveState();
            }
        }

        function deleteEntry(id) {
            const index = state.ledger.findIndex(item => item.id === id);
            if (index !== -1) {
                const deletedEntry = state.ledger[index];
                if (window.confirm(`Are you sure you want to delete "${deletedEntry.description}"?`)) {
                    state.ledger.splice(index, 1);
                    logAction('Deleted', deletedEntry.description, `Amount: ${formatCurrency(deletedEntry.amount)}, Category: ${deletedEntry.category}`);
                    saveState();
                }
            }
        }

        // Modal Functions
        function openEditModal(id) {
            const entry = state.ledger.find(item => item.id === id);
            if (!entry) return;

            document.getElementById('entryModalTitle').textContent = 'Edit Entry';
            document.getElementById('entryId').value = entry.id;
            document.getElementById('entryDate').value = entry.date;
            document.getElementById('entryDescription').value = entry.description;
            document.getElementById('entryCategory').value = entry.category;
            document.getElementById('entryQty').value = entry.qty;
            document.getElementById('entryAmount').value = entry.amount;
            document.getElementById('entryTotal').textContent = entry.total.toFixed(2);

            const modal = new bootstrap.Modal(document.getElementById('addEntryModal'));
            modal.show();
        }

        function resetAddModal() {
            document.getElementById('entryModalTitle').textContent = 'Add Entry';
            document.getElementById('entryForm').reset();
            document.getElementById('entryId').value = '';
            document.getElementById('entryTotal').textContent = '0.00';
            document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
        }

        // Toast Function
        function showToast(message, type) {
            const toast = document.getElementById('syncToast');
            const toastBody = document.getElementById('toastMessage');
            const toastHeader = toast.querySelector('.toast-header');
            
            // Set message
            toastBody.textContent = message;
            
            // Set type (success or danger)
            if (type === 'success') {
                toast.classList.remove('text-bg-danger');
                toast.classList.add('text-bg-success');
            } else {
                toast.classList.remove('text-bg-success');
                toast.classList.add('text-bg-danger');
            }
            
            // Show toast
            const bsToast = new bootstrap.Toast(toast);
            bsToast.show();
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize app
            loadState();

            // Settings form
            document.getElementById('saveSettingsBtn').addEventListener('click', function() {
                const token = document.getElementById('githubToken').value;
                const username = document.getElementById('githubUsername').value;
                const repo = document.getElementById('githubRepo').value;
                const file = document.getElementById('githubFile').value;

                localStorage.setItem('github_token', token);
                localStorage.setItem('github_username', username);
                localStorage.setItem('github_repo', repo);
                localStorage.setItem('github_file', file);

                bootstrap.Modal.getInstance(document.getElementById('settingsModal')).hide();
                alert('Settings saved successfully!');
            });

            // Entry form
            document.getElementById('saveEntryBtn').addEventListener('click', function() {
                const id = document.getElementById('entryId').value;
                const date = document.getElementById('entryDate').value;
                const description = document.getElementById('entryDescription').value;
                const category = document.getElementById('entryCategory').value;
                const qty = parseInt(document.getElementById('entryQty').value);
                const amount = parseFloat(document.getElementById('entryAmount').value);
                const total = qty * amount;

                const entry = { id: id || generateId(), date, description, category, qty, amount, total };

                if (id) {
                    updateEntry(id, entry);
                } else {
                    addEntry(entry);
                }

                bootstrap.Modal.getInstance(document.getElementById('addEntryModal')).hide();
                resetAddModal();
            });

            // Calculate total when qty or amount changes
            document.getElementById('entryQty').addEventListener('input', updateTotal);
            document.getElementById('entryAmount').addEventListener('input', updateTotal);

            function updateTotal() {
                const qty = parseInt(document.getElementById('entryQty').value) || 0;
                const amount = parseFloat(document.getElementById('entryAmount').value) || 0;
                document.getElementById('entryTotal').textContent = (qty * amount).toFixed(2);
            }

            // Sync button
            document.getElementById('syncBtn').addEventListener('click', async function() {
                const btn = this;
                const originalText = btn.textContent;
                
                try {
                    btn.textContent = 'Syncing...';
                    btn.disabled = true;
                    
                    await githubAPI.syncToGitHub();
                    showToast('Successfully synced to GitHub!', 'success');
                } catch (error) {
                    showToast('Sync failed: ' + error.message, 'danger');
                } finally {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            });

            // Load from GitHub on startup if credentials exist
            const creds = githubAPI.getCredentials();
            if (creds.token && creds.username && creds.repo) {
                githubAPI.fetchFromGitHub()
                    .then(data => {
                        state = data.content;
                        saveState();
                    })
                    .catch(error => {
                        console.warn('Could not load from GitHub:', error.message);
                    });
            }
        });
    </script>
</body>
</html>
